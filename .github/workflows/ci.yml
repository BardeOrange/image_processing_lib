name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify CMakeLists.txt exists
        run: |
          echo "=== Files in root ==="
          ls -la
          echo "=== CMakeLists.txt ==="
          cat CMakeLists.txt

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Build C++ module
        run: |
          cmake -S . -B build -DPYBIND11_FINDPYTHON=ON
          cmake --build build --config Release

      - name: Copy C++ module
        run: |
          find build -name "imgproc_cpp*" -type f
          find build -name "imgproc_cpp*.so" -exec cp {} . \;
          ls -la imgproc_cpp*

      - name: Verify module
        run: python -c "import imgproc_cpp; print('Module loaded OK')"

      - name: Run tests
        run: pytest tests/ -v